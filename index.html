
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
  .yz-root{--bg:#05020d;--bg2:#0c0618;--bg3:#130d22;--border:rgba(160,100,255,0.12);--border2:rgba(160,100,255,0.25);--text:#e8deff;--muted:#9a7fc4;--accent:#b06fff;--accent2:#9550f5;background:var(--bg);color:var(--text);font-family:'VT323',monospace;padding:16px;border-radius:4px;max-width:720px;margin:0 auto;}
  .yz-label{font-family:'VT323',monospace;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  .yz-h2{font-family:'Press Start 2P',monospace;font-size:16px;font-weight:400;color:var(--text);text-shadow:0 0 20px rgba(176,111,255,.3);margin:0 0 6px;line-height:1.4;}
  .yz-sub{font-family:'VT323',monospace;font-size:17px;color:var(--muted);margin:0 0 18px;}
  .yz-tracks{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
  .yz-track{display:flex;align-items:center;gap:10px;background:var(--bg2);border:2px solid var(--border);border-radius:2px;padding:10px 12px;cursor:pointer;transition:background .15s,border-color .15s;}
  .yz-track:hover{background:var(--bg3);border-color:var(--accent);}
  .yz-track.playing{border-color:var(--accent);background:rgba(176,111,255,.1);}
  .yz-track .num{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--muted);min-width:22px;}
  .yz-track.playing .num{color:var(--accent);}
  .yz-track .icon{font-size:12px;color:var(--muted);width:16px;text-align:center;}
  .yz-track.playing .icon{color:var(--accent);}
  .yz-track .tname{font-family:'VT323',monospace;font-size:19px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .yz-track.playing .tname{color:var(--accent);text-shadow:0 0 8px var(--accent);}
  .yz-bar{background:var(--bg2);border:2px solid var(--border2);border-radius:2px;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:4px 4px 0 #6a00cc;}
  .yz-np{min-width:140px;max-width:200px;}
  .yz-np-sub{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--accent);letter-spacing:.05em;text-shadow:0 0 6px var(--accent);margin-bottom:4px;}
  .yz-np-name{font-family:'VT323',monospace;font-size:18px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
  .yz-transport{display:flex;align-items:center;gap:8px;}
  .yz-tbtn{background:rgba(176,111,255,.1);border:2px solid var(--border2);color:var(--text);border-radius:2px;width:34px;height:34px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;padding:0;transition:border-color .1s,color .1s,transform .1s;}
  .yz-tbtn:hover{border-color:var(--accent);color:var(--accent);}
  .yz-tbtn:active{transform:scale(.93);}
  .yz-tbtn.pp{width:40px;height:40px;background:var(--accent);color:#05020d;border:none;font-size:16px;box-shadow:3px 3px 0 #6a00cc;}
  .yz-tbtn.pp:hover{background:var(--accent2);color:#05020d;}
  .yz-tbtn.loop.on{border-color:var(--accent);color:var(--accent);}
  .yz-prog{flex:1 1 180px;display:flex;align-items:center;gap:8px;min-width:140px;}
  .yz-time{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);min-width:32px;text-align:center;}
  .yz-seek{flex:1;-webkit-appearance:none;appearance:none;height:5px;border-radius:1px;background:var(--bg3);border:1px solid var(--border);outline:none;cursor:pointer;}
  .yz-seek::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:0;background:var(--accent);cursor:pointer;box-shadow:0 0 4px var(--accent);}
  .yz-seek::-moz-range-thumb{width:12px;height:12px;border-radius:0;background:var(--accent);border:none;cursor:pointer;}
  .yz-vol-row{display:flex;align-items:center;gap:6px;}
  .yz-vol-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);}
  .yz-hint{font-family:'VT323',monospace;font-size:14px;color:var(--muted);margin-top:10px;padding:8px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:2px;line-height:1.5;}
  .yz-hint span{color:var(--accent);}
</style>

<div class="yz-root">
  <p class="yz-label">♪ Music Player</p>
  <h2 class="yz-h2">Soundtrack</h2>
  <p class="yz-sub">Click any track to play — add your own by editing the script.</p>

  <div class="yz-tracks" id="yzTracks"></div>

  <div class="yz-bar">
    <div class="yz-np">
      <div class="yz-np-sub">♪ NOW PLAYING</div>
      <div class="yz-np-name" id="yzNpName">Nothing playing</div>
    </div>
    <div class="yz-transport">
      <button class="yz-tbtn" id="yzPrev">⏮</button>
      <button class="yz-tbtn pp" id="yzPP">▶</button>
      <button class="yz-tbtn" id="yzNext">⏭</button>
      <button class="yz-tbtn loop" id="yzLoop">⟲</button>
    </div>
    <div class="yz-prog">
      <span class="yz-time" id="yzCur">0:00</span>
      <input type="range" class="yz-seek" id="yzSeek" min="0" max="100" value="0" step="0.1" />
      <span class="yz-time" id="yzDur">0:00</span>
    </div>
    <div class="yz-vol-row">
      <span class="yz-vol-lbl">VOL</span>
      <input type="range" class="yz-seek" id="yzVol" min="0" max="1" step="0.01" value="0.7" style="width:70px;" />
    </div>
  </div>

  <div class="yz-hint">
    To add songs: edit the <span>TRACKS</span> array in the script — paste in the raw GitHub URL and give it a name.
  </div>
</div>

<audio id="yzAudio"></audio>

<script>
// ============================================================
//  ADD YOUR TRACKS HERE — just paste the raw URL and a name
// ============================================================
var TRACKS = [
  {
    name: "Liminal Spaces — Dark Ambient Mix 4",
    url:  "https://raw.githubusercontent.com/redvr777/Yuza/67930de687f2729d2ed1f2cc7168189f8660b57a/liminal%20spaces%20__%20dark%20ambient%20music%20mix%204%20(1).mp3"
  },
  // Add more tracks like this:
  // { name: "Track Name Here", url: "https://raw.githubusercontent.com/..." },
  // { name: "Another Track",   url: "https://raw.githubusercontent.com/..." },
];
// ============================================================

(function(){
  var cur = -1;
  var seeking = false;
  var audio = document.getElementById('yzAudio');
  var trackList = document.getElementById('yzTracks');
  var npName = document.getElementById('yzNpName');
  var pp = document.getElementById('yzPP');
  var prev = document.getElementById('yzPrev');
  var next = document.getElementById('yzNext');
  var loop = document.getElementById('yzLoop');
  var seek = document.getElementById('yzSeek');
  var curT = document.getElementById('yzCur');
  var durT = document.getElementById('yzDur');
  var vol = document.getElementById('yzVol');
  audio.volume = 0.7;

  function fmt(s){
    if(!s||isNaN(s))return'0:00';
    var m=Math.floor(s/60),sec=Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
  }

  function render(){
    trackList.innerHTML='';
    TRACKS.forEach(function(t,i){
      var div=document.createElement('div');
      div.className='yz-track'+(i===cur?' playing':'');
      div.innerHTML=
        '<span class="num">'+(i+1<10?'0'+(i+1):i+1)+'</span>'+
        '<span class="icon">'+(i===cur&&!audio.paused?'⏸':'▶')+'</span>'+
        '<span class="tname">'+t.name+'</span>';
      div.addEventListener('click',function(){ playTrack(i); });
      trackList.appendChild(div);
    });
  }

  function playTrack(i){
    if(i<0||i>=TRACKS.length)return;
    cur=i;
    audio.src=TRACKS[i].url;
    audio.play().catch(function(){});
    npName.textContent=TRACKS[i].name;
    pp.textContent='⏸';
    render();
  }

  pp.addEventListener('click',function(){
    if(cur<0&&TRACKS.length)return playTrack(0);
    if(audio.paused){audio.play().catch(function(){});pp.textContent='⏸';}
    else{audio.pause();pp.textContent='▶';}
    render();
  });
  prev.addEventListener('click',function(){
    if(!TRACKS.length)return;
    playTrack(cur<=0?TRACKS.length-1:cur-1);
  });
  next.addEventListener('click',function(){
    if(!TRACKS.length)return;
    playTrack(cur>=TRACKS.length-1?0:cur+1);
  });
  loop.addEventListener('click',function(){
    audio.loop=!audio.loop;
    loop.classList.toggle('on',audio.loop);
  });
  audio.addEventListener('ended',function(){if(!audio.loop)next.click();});
  audio.addEventListener('play',function(){pp.textContent='⏸';render();});
  audio.addEventListener('pause',function(){pp.textContent='▶';render();});
  audio.addEventListener('loadedmetadata',function(){seek.max=audio.duration||0;durT.textContent=fmt(audio.duration);});
  audio.addEventListener('timeupdate',function(){if(!seeking){seek.value=audio.currentTime;curT.textContent=fmt(audio.currentTime);}});
  seek.addEventListener('mousedown',function(){seeking=true;});
  seek.addEventListener('input',function(){curT.textContent=fmt(Number(seek.value));});
  seek.addEventListener('change',function(){audio.currentTime=Number(seek.value);seeking=false;});
  vol.addEventListener('input',function(){audio.volume=Number(vol.value);});

  render();
})();
</script>
