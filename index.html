<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuza — Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a0822;--bg2:#240d30;--bg3:#2e1240;
  --border:rgba(255,140,80,0.15);--border2:rgba(255,140,80,0.35);
  --text:#ffe8d0;--muted:#c47a5a;
  --accent:#ff7043;--accent2:#e8450a;
  --pink:#ff3d9a;--gold:#ffb830;
  --aglow:rgba(255,112,67,0.10);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'VT323',monospace;}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg);position:relative;overflow:hidden;}

.hero{flex-shrink:0;background:var(--bg2);border-bottom:2px solid var(--border2);padding:18px 20px 14px;display:flex;flex-direction:column;align-items:center;gap:12px;position:relative;}
.hero-art{width:120px;height:120px;background:var(--bg3);border:2px solid var(--border2);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:4px 4px 0 #8b0033;flex-shrink:0;}
.hero-info{text-align:center;}
.hero-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--text);line-height:1.7;margin-bottom:4px;letter-spacing:.02em;word-break:break-word;}
.hero-sub{font-family:'VT323',monospace;font-size:17px;color:var(--pink);letter-spacing:.08em;text-shadow:0 0 8px var(--pink);}

/* SEARCH (top right of hero) */
.search-wrap{position:absolute;top:14px;right:14px;z-index:60;}
.search-toggle{background:var(--aglow);border:2px solid var(--border2);color:var(--text);width:30px;height:30px;border-radius:2px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:color .1s,border-color .1s;}
.search-toggle:hover{color:var(--accent);border-color:var(--accent);}
.search-toggle.on{color:var(--accent);border-color:var(--accent);}
.search-box{position:absolute;top:36px;right:0;width:200px;display:none;}
.search-box.open{display:block;}
.search-input{width:100%;font-family:'VT323',monospace;font-size:16px;color:var(--text);background:var(--bg3);border:2px solid var(--border2);border-radius:2px;padding:7px 9px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-input::placeholder{color:var(--muted);}
.search-results{margin-top:4px;background:var(--bg3);border:2px solid var(--border2);border-radius:2px;box-shadow:4px 4px 0 #8b0033;max-height:240px;overflow-y:auto;}
.search-results::-webkit-scrollbar{width:3px;}
.search-results::-webkit-scrollbar-thumb{background:var(--border2);}
.search-result{padding:9px 10px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .1s;}
.search-result:last-child{border-bottom:none;}
.search-result:hover{background:var(--bg2);}
.search-result .srname{font-family:'VT323',monospace;font-size:18px;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.search-result .srpl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted);margin-top:3px;}
.search-empty{padding:10px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);text-align:center;}

/* PLAYLIST TABS */
.pl-tabs{flex-shrink:0;display:flex;overflow-x:auto;border-bottom:2px solid var(--border2);background:var(--bg2);}
.pl-tabs::-webkit-scrollbar{height:2px;}
.pl-tabs::-webkit-scrollbar-thumb{background:var(--border2);}
.pl-tab{flex-shrink:0;padding:8px 14px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);cursor:pointer;border-right:1px solid var(--border);white-space:nowrap;transition:color .1s,background .1s;}
.pl-tab:hover{color:var(--text);background:var(--bg3);}
.pl-tab.active{color:var(--gold);background:var(--bg);border-bottom:2px solid var(--gold);margin-bottom:-2px;}

.status-bar{flex-shrink:0;padding:7px 18px;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--gold);display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);background:var(--bg);}
.dot{width:7px;height:7px;background:var(--gold);flex-shrink:0;animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.status-bar.ok .dot{background:#ff7043;animation:none;}
.status-bar.ok{color:#ff7043;}
.status-bar.err .dot{background:var(--pink);animation:none;}
.status-bar.err{color:var(--pink);}

/* VIEW TABS (Tracks / Queue) */
.view-tabs{flex-shrink:0;display:flex;border-bottom:2px solid var(--border2);background:var(--bg2);}
.view-tab{flex:1;padding:8px 10px;font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);cursor:pointer;text-align:center;transition:color .1s,background .1s;border-bottom:2px solid transparent;}
.view-tab:hover{color:var(--text);background:var(--bg3);}
.view-tab.active{color:var(--gold);background:var(--bg);border-bottom:2px solid var(--gold);}
.view-tab .qcount{color:var(--pink);}

/* TOOLBAR (clear queue) */
.toolbar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--border);}
.tool-btn{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);background:var(--aglow);border:1px solid var(--border2);border-radius:2px;padding:6px 9px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:color .1s,border-color .1s;}
.tool-btn:hover{color:var(--accent);border-color:var(--accent);}
.tool-btn.on{color:var(--gold);border-color:var(--gold);}
.tool-spacer{flex:1;}

.tlist{flex:1;overflow-y:auto;padding:8px 14px;background:var(--bg);}
.tlist::-webkit-scrollbar{width:3px;}
.tlist::-webkit-scrollbar-track{background:var(--bg2);}
.tlist::-webkit-scrollbar-thumb{background:var(--border2);}

.pl-section-header{
  font-family:'Press Start 2P',monospace;font-size:7px;
  color:var(--pink);letter-spacing:.06em;
  padding:12px 4px 6px;border-bottom:1px solid var(--border2);
  margin-bottom:2px;
}

.track{display:flex;align-items:center;gap:10px;padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-radius:2px;position:relative;}
.track:hover{background:var(--bg2);}
.track.playing{background:var(--aglow);}
.track .num{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--muted);min-width:22px;flex-shrink:0;}
.track.playing .num{color:var(--gold);}
.track .ico{font-size:13px;color:var(--muted);width:16px;text-align:center;flex-shrink:0;}
.track.playing .ico{color:var(--accent);}
.track-info{flex:1;min-width:0;}
.track .tname{font-family:'VT323',monospace;font-size:22px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;letter-spacing:.03em;}
.track.playing .tname{color:var(--gold);text-shadow:0 0 6px var(--gold);}
.track .tplname{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted);margin-top:2px;}
.track .ext{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:3px 6px;flex-shrink:0;border-radius:1px;}
.empty{text-align:center;padding:40px 16px;font-family:'Press Start 2P',monospace;font-size:9px;color:var(--muted);line-height:2.2;}

/* MENU BUTTON + DROPDOWN */
.menu-wrap{position:relative;flex-shrink:0;}
.menu-btn{background:none;border:1px solid var(--border2);color:var(--muted);width:26px;height:26px;border-radius:2px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:color .1s,border-color .1s;}
.menu-btn:hover{color:var(--accent);border-color:var(--accent);}
.menu-dd{position:absolute;right:0;top:30px;background:var(--bg3);border:2px solid var(--border2);border-radius:2px;box-shadow:4px 4px 0 #8b0033;z-index:50;min-width:150px;overflow:hidden;}
.menu-dd-item{padding:9px 12px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--text);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);transition:background .1s,color .1s;}
.menu-dd-item:last-child{border-bottom:none;}
.menu-dd-item:hover{background:var(--bg2);color:var(--accent);}
.menu-dd-item.disabled{color:var(--muted);opacity:.4;cursor:default;}
.menu-dd-item.disabled:hover{background:none;color:var(--muted);}
.menu-dd-item.danger:hover{color:var(--pink);}

.bar{flex-shrink:0;background:var(--bg2);border-top:2px solid var(--border2);box-shadow:0 -3px 0 #8b0033;padding:10px 18px 14px;}
.bar-np{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px;}
.bar-np-text{min-width:0;flex:1;}
.bar-np-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--pink);text-shadow:0 0 5px var(--pink);letter-spacing:.05em;margin-bottom:2px;}
.bar-np-name{font-family:'VT323',monospace;font-size:20px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-np-pl{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--muted);margin-top:1px;}
.bar-vol{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.vol-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;background:var(--bg3);border:1px solid var(--border2);outline:none;cursor:pointer;border-radius:1px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:0;background:var(--accent);cursor:pointer;box-shadow:0 0 4px var(--accent);}
input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:0;background:var(--accent);border:none;cursor:pointer;}
.bar-vol input{width:72px;}
.prog{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.time{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);min-width:32px;text-align:center;flex-shrink:0;}
.prog input{flex:1;}
.transport{display:flex;align-items:center;justify-content:center;gap:10px;}
.tbtn{background:var(--aglow);border:2px solid var(--border2);color:var(--text);border-radius:2px;width:44px;height:44px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;padding:0;transition:border-color .1s,color .1s,transform .1s;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn:active{transform:scale(.9);}
.tbtn.pp{width:56px;height:56px;background:var(--pink);color:#1a0822;border:none;font-size:22px;box-shadow:3px 3px 0 #8b0033;}
.tbtn.pp:hover{background:#e0007a;color:#1a0822;}
.tbtn.loop.on{border-color:var(--gold);color:var(--gold);}
.tbtn.shuffle.on{border-color:var(--gold);color:var(--gold);}

@media(max-width:400px){
  .hero{padding:12px 14px 10px;}
  .hero-art{width:90px;height:90px;font-size:34px;}
  .hero-title{font-size:9px;}
  .bar{padding:8px 14px 12px;}
  .bar-vol{display:none;}
  .tbtn{width:38px;height:38px;font-size:14px;}
  .tbtn.pp{width:48px;height:48px;font-size:18px;}
  .transport{gap:6px;}
  .track .tname{font-size:20px;}
  .search-box{width:160px;}
}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="search-wrap" id="searchWrap">
      <button class="search-toggle" id="searchToggle" title="Search">🔍</button>
      <div class="search-box" id="searchBox">
        <input type="text" class="search-input" id="searchInput" placeholder="Search songs…" autocomplete="off">
        <div class="search-results" id="searchResults" style="display:none;"></div>
      </div>
    </div>
    <div class="hero-art" id="heroArt">🌅</div>
    <div class="hero-info">
      <div class="hero-title" id="heroTitle">Select a track</div>
      <div class="hero-sub" id="heroSub">Yuza Player</div>
    </div>
  </div>

  <div class="pl-tabs" id="plTabs"></div>

  <div class="status-bar" id="statusBar">
    <div class="dot"></div>
    <span id="statusTx">Loading playlists…</span>
  </div>

  <div class="view-tabs" id="viewTabs">
    <div class="view-tab active" data-view="tracks">TRACKS</div>
    <div class="view-tab" data-view="queue">QUEUE <span class="qcount" id="qcount"></span></div>
  </div>

  <div class="toolbar" id="toolbar">
    <div class="tool-spacer"></div>
    <button class="tool-btn danger-tool" id="btnClearQ" style="display:none;">🗑 CLEAR QUEUE</button>
  </div>

  <div class="tlist" id="tlist">
    <div class="empty">Loading…</div>
  </div>

  <div class="bar">
    <div class="bar-np">
      <div class="bar-np-text">
        <div class="bar-np-label">♪ NOW PLAYING</div>
        <div class="bar-np-name" id="npName">Nothing playing</div>
        <div class="bar-np-pl" id="npPl"></div>
      </div>
      <div class="bar-vol">
        <span class="vol-lbl">VOL</span>
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7">
      </div>
    </div>
    <div class="prog">
      <span class="time" id="tCur">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
      <span class="time" id="tDur">0:00</span>
    </div>
    <div class="transport">
      <button class="tbtn shuffle" id="btnShuffle" title="Shuffle">🔀</button>
      <button class="tbtn" id="btnPrev" title="Previous">⏮</button>
      <button class="tbtn pp" id="btnPP" title="Play / Pause">▶</button>
      <button class="tbtn" id="btnNext" title="Next">⏭</button>
      <button class="tbtn loop" id="btnLoop" title="Loop">⟲</button>
    </div>
  </div>
</div>
<audio id="aud"></audio>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║                  ★  PLAYLISTS CONFIG  ★                     ║
// ║  Add or remove entries below. Each entry is:                 ║
// ║    name   — label shown in the tab and player               ║
// ║    repo   — GitHub repo as "username/reponame"              ║
// ║    branch — usually "main" or "master" (tries main first)   ║
// ║    emoji  — icon shown in the hero art for this playlist    ║
// ╚══════════════════════════════════════════════════════════════╝
var PLAYLISTS = [
  { name: 'BACC',         repo: 'redvr777/BACC',       branch: 'main', emoji: '🌅' },
  { name: 'armands-songs',         repo: 'redvr777/armands-songs',       branch: 'main', emoji: '🦥' },
  { name: 'cades-music',         repo: 'redvr777/cades-music',       branch: 'main', emoji: '🐿️' },
    { name: 'brian',         repo: 'redvr777/brian',       branch: 'main', emoji: '🧠' },
      { name: 'chera',         repo: 'redvr777/chera',       branch: 'main', emoji: '🐈' },

];
// ═══════════════════════════════════════════════════════════════

var EXTS=['mp3','wav','ogg','m4a','flac','aac','webm','opus','mov','mpeg','mpg'];
var STORE_KEY='yuza_state_v3';

// Each playlist gets a tracks array; combined flat list for prev/next
var plData = PLAYLISTS.map(function(p){ return { info: p, tracks: [], loaded: false, error: false }; });
var allTracks = []; // flat: { name, url, ext, plIdx }
var cur = -1, seeking = false, pendingSeek = -1, activeTab = 0;
var currentView = 'tracks'; // 'tracks' | 'queue'
var shuffleOn = false;
var queue = []; // array of allTracks indices, in play order
var openMenu = null; // { type:'track'|'queue', idx } currently open dropdown key

var aud       = document.getElementById('aud');
var tlist     = document.getElementById('tlist');
var npName    = document.getElementById('npName');
var npPl      = document.getElementById('npPl');
var heroTitle = document.getElementById('heroTitle');
var heroSub   = document.getElementById('heroSub');
var heroArt   = document.getElementById('heroArt');
var btnPP     = document.getElementById('btnPP');
var btnPrev   = document.getElementById('btnPrev');
var btnNext   = document.getElementById('btnNext');
var btnLoop   = document.getElementById('btnLoop');
var btnShuffle= document.getElementById('btnShuffle');
var btnClearQ = document.getElementById('btnClearQ');
var seek      = document.getElementById('seek');
var tCur      = document.getElementById('tCur');
var tDur      = document.getElementById('tDur');
var vol       = document.getElementById('vol');
var statusBar = document.getElementById('statusBar');
var statusTx  = document.getElementById('statusTx');
var plTabs    = document.getElementById('plTabs');
var viewTabs  = document.getElementById('viewTabs');
var qcount    = document.getElementById('qcount');
var searchWrap    = document.getElementById('searchWrap');
var searchToggle  = document.getElementById('searchToggle');
var searchBox     = document.getElementById('searchBox');
var searchInput   = document.getElementById('searchInput');
var searchResults = document.getElementById('searchResults');

// ── STATE PERSISTENCE ──
function saveState(){
  try{
    localStorage.setItem(STORE_KEY, JSON.stringify({
      cur: cur, time: aud.currentTime||0,
      volume: aud.volume, loop: aud.loop, tab: activeTab,
      shuffle: shuffleOn, queue: queue
    }));
  }catch(e){}
}
function loadState(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)||'null'); }catch(e){ return null; } }
window.addEventListener('beforeunload', saveState);
setInterval(saveState, 5000);

// init volume early
(function(){
  var s=loadState();
  if(s&&s.volume!=null){ aud.volume=s.volume; vol.value=s.volume; }
  else{ aud.volume=0.7; vol.value=0.7; }
})();

function setStatus(t,m){ statusBar.className='status-bar '+t; statusTx.textContent=m; }
function fmt(s){ if(!s||isNaN(s))return'0:00'; var m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }
function extOf(p){ return(p.split('.').pop()||'').toLowerCase(); }
function cleanName(p){ var n=p.split('/').pop().replace(/\.[^.]+$/,''); return decodeURIComponent(n).replace(/[_+]/g,' '); }
function rawUrl(repo, branch, path){ return 'https://raw.githubusercontent.com/'+repo+'/'+branch+'/'+encodeURI(path); }

// ── DOWNLOAD HELPER ──
function downloadTrack(globalIdx){
  var t=allTracks[globalIdx];
  if(!t) return;
  fetch(t.url)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.blob(); })
    .then(function(blob){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');
      a.href=url;
      a.download=t.name+'.'+t.ext;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    })
    .catch(function(){
      // fallback: open in new tab if fetch/blob fails (e.g. CORS)
      window.open(t.url, '_blank');
    });
}

// ── TABS (playlists) ──
function buildTabs(){
  plTabs.innerHTML='';
  PLAYLISTS.forEach(function(p, i){
    var t=document.createElement('div');
    t.className='pl-tab'+(i===activeTab?' active':'');
    t.textContent=p.name;
    t.addEventListener('click', function(){ switchTab(i); });
    plTabs.appendChild(t);
  });
}

function switchTab(i){
  activeTab=i;
  if(currentView!=='tracks'){ currentView='tracks'; updateViewTabs(); }
  buildTabs();
  renderList();
}

// ── VIEW TABS (Tracks / Queue) ──
function updateViewTabs(){
  var tabs=viewTabs.querySelectorAll('.view-tab');
  tabs.forEach(function(t){ t.classList.toggle('active', t.dataset.view===currentView); });
  toolbar.style.display = (currentView==='tracks') ? 'flex' : 'flex';
  btnClearQ.style.display = (currentView==='queue') ? 'flex' : 'none';
  qcount.textContent = queue.length ? '('+queue.length+')' : '';
}
viewTabs.querySelectorAll('.view-tab').forEach(function(t){
  t.addEventListener('click', function(){
    currentView=t.dataset.view;
    openMenu=null;
    updateViewTabs();
    renderList();
  });
});

var toolbar = document.getElementById('toolbar');

// ── REBUILD FLAT LIST ──
function rebuildAllTracks(){
  allTracks=[];
  plData.forEach(function(pl, pi){
    pl.tracks.forEach(function(t){
      allTracks.push({ name:t.name, url:t.url, ext:t.ext, plIdx:pi });
    });
  });
}

// ── QUEUE HELPERS ──
function addToQueue(idx){
  queue.push(idx);
  saveState();
  if(currentView==='queue') renderList();
  updateViewTabs();
}
function removeFromQueue(qPos){
  queue.splice(qPos,1);
  saveState();
  renderList();
  updateViewTabs();
}
function moveQueueItem(qPos, dir){
  var ni=qPos+dir;
  if(ni<0||ni>=queue.length) return;
  var tmp=queue[qPos]; queue[qPos]=queue[ni]; queue[ni]=tmp;
  saveState();
  renderList();
}
function moveQueueToTop(qPos){
  if(qPos<=0) return;
  var item=queue.splice(qPos,1)[0];
  queue.unshift(item);
  saveState();
  renderList();
}
function clearQueue(){
  queue=[];
  saveState();
  renderList();
  updateViewTabs();
}
function playFromQueueNext(){
  // pops the first queue item and plays it
  if(!queue.length) return null;
  var idx=queue.shift();
  saveState();
  return idx;
}

// ── DROPDOWN MENU ──
function closeMenus(){
  var open=document.querySelectorAll('.menu-dd');
  open.forEach(function(m){ m.remove(); });
}
document.addEventListener('click', function(e){
  if(!e.target.closest('.menu-wrap')){ closeMenus(); }
  if(!e.target.closest('.search-wrap')){ closeSearch(); }
});

function buildTrackMenu(globalIdx){
  var dd=document.createElement('div');
  dd.className='menu-dd';

  var addQ=document.createElement('div');
  addQ.className='menu-dd-item';
  addQ.innerHTML='➕ Add to queue';
  addQ.addEventListener('click', function(e){
    e.stopPropagation();
    addToQueue(globalIdx);
    closeMenus();
  });
  dd.appendChild(addQ);

  var playNext=document.createElement('div');
  playNext.className='menu-dd-item';
  playNext.innerHTML='⏭ Play next';
  playNext.addEventListener('click', function(e){
    e.stopPropagation();
    queue.unshift(globalIdx);
    saveState();
    updateViewTabs();
    closeMenus();
  });
  dd.appendChild(playNext);

  var dl=document.createElement('div');
  dl.className='menu-dd-item';
  dl.innerHTML='⬇ Download';
  dl.addEventListener('click', function(e){
    e.stopPropagation();
    downloadTrack(globalIdx);
    closeMenus();
  });
  dd.appendChild(dl);

  return dd;
}

function buildQueueMenu(qPos){
  var dd=document.createElement('div');
  dd.className='menu-dd';

  var top=document.createElement('div');
  top.className='menu-dd-item'+(qPos===0?' disabled':'');
  top.innerHTML='⤒ Move to top';
  if(qPos!==0){
    top.addEventListener('click', function(e){ e.stopPropagation(); moveQueueToTop(qPos); closeMenus(); });
  }
  dd.appendChild(top);

  var up=document.createElement('div');
  up.className='menu-dd-item'+(qPos===0?' disabled':'');
  up.innerHTML='↑ Move up';
  if(qPos!==0){
    up.addEventListener('click', function(e){ e.stopPropagation(); moveQueueItem(qPos,-1); closeMenus(); });
  }
  dd.appendChild(up);

  var down=document.createElement('div');
  down.className='menu-dd-item'+(qPos===queue.length-1?' disabled':'');
  down.innerHTML='↓ Move down';
  if(qPos!==queue.length-1){
    down.addEventListener('click', function(e){ e.stopPropagation(); moveQueueItem(qPos,1); closeMenus(); });
  }
  dd.appendChild(down);

  var globalIdx=queue[qPos];
  var dl=document.createElement('div');
  dl.className='menu-dd-item';
  dl.innerHTML='⬇ Download';
  dl.addEventListener('click', function(e){
    e.stopPropagation();
    downloadTrack(globalIdx);
    closeMenus();
  });
  dd.appendChild(dl);

  var rem=document.createElement('div');
  rem.className='menu-dd-item danger';
  rem.innerHTML='✕ Remove from queue';
  rem.addEventListener('click', function(e){ e.stopPropagation(); removeFromQueue(qPos); closeMenus(); });
  dd.appendChild(rem);

  return dd;
}

function attachMenu(wrap, builder){
  var btn=document.createElement('button');
  btn.className='menu-btn';
  btn.innerHTML='⋮';
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    var existing=wrap.querySelector('.menu-dd');
    var wasOpen=!!existing;
    closeMenus();
    if(!wasOpen){
      wrap.appendChild(builder());
    }
  });
  wrap.appendChild(btn);
}

// ── SEARCH ──
function closeSearch(){
  searchBox.classList.remove('open');
  searchToggle.classList.remove('on');
  searchResults.style.display='none';
  searchResults.innerHTML='';
}
searchToggle.addEventListener('click', function(e){
  e.stopPropagation();
  var isOpen=searchBox.classList.contains('open');
  if(isOpen){
    closeSearch();
  } else {
    searchBox.classList.add('open');
    searchToggle.classList.add('on');
    searchInput.value='';
    searchResults.style.display='none';
    searchResults.innerHTML='';
    setTimeout(function(){ searchInput.focus(); }, 0);
  }
});
searchBox.addEventListener('click', function(e){ e.stopPropagation(); });

// fuzzy-ish match: true if query chars/words match name closely or as prefix/substring
function matchesQuery(name, query){
  var n=name.toLowerCase();
  var q=query.toLowerCase().trim();
  if(!q) return false;
  if(n.indexOf(q)!==-1) return true; // direct substring anywhere
  // word-prefix match: each query word should prefix-match some word in the name
  var qWords=q.split(/\s+/);
  var nWords=n.split(/[\s_\-]+/);
  return qWords.every(function(qw){
    return nWords.some(function(nw){ return nw.indexOf(qw)===0; });
  });
}

function runSearch(){
  var q=searchInput.value.trim();
  searchResults.innerHTML='';
  if(!q){
    searchResults.style.display='none';
    return;
  }
  var matches=[];
  allTracks.forEach(function(t, idx){
    if(matchesQuery(t.name, q)) matches.push(idx);
  });
  // prioritize matches that start with the query
  var ql=q.toLowerCase();
  matches.sort(function(a,b){
    var an=allTracks[a].name.toLowerCase(), bn=allTracks[b].name.toLowerCase();
    var aStart=an.indexOf(ql)===0?0:1;
    var bStart=bn.indexOf(ql)===0?0:1;
    if(aStart!==bStart) return aStart-bStart;
    return an.length-bn.length;
  });
  matches=matches.slice(0,8);

  searchResults.style.display='block';
  if(!matches.length){
    var empty=document.createElement('div');
    empty.className='search-empty';
    empty.textContent='No matches';
    searchResults.appendChild(empty);
    return;
  }
  matches.forEach(function(idx){
    var t=allTracks[idx];
    var div=document.createElement('div');
    div.className='search-result';
    div.innerHTML='<div class="srname">'+t.name+'</div><div class="srpl">'+PLAYLISTS[t.plIdx].name.toUpperCase()+'</div>';
    div.addEventListener('click', function(){
      playTrack(idx);
      closeSearch();
    });
    searchResults.appendChild(div);
  });
}
searchInput.addEventListener('input', runSearch);
searchInput.addEventListener('focus', runSearch);

// ── RENDER TRACK LIST ──
function renderList(){
  closeMenus();
  tlist.innerHTML='';

  if(currentView==='queue'){
    renderQueue();
    return;
  }

  var pl=plData[activeTab];
  if(!pl.loaded && !pl.error){
    var d=document.createElement('div'); d.className='empty'; d.textContent='Loading…'; tlist.appendChild(d); return;
  }
  if(pl.error){
    var d=document.createElement('div'); d.className='empty'; d.textContent='Could not load this playlist.'; tlist.appendChild(d); return;
  }
  if(!pl.tracks.length){
    var d=document.createElement('div'); d.className='empty'; d.textContent='No audio files found.'; tlist.appendChild(d); return;
  }

  var header=document.createElement('div');
  header.className='pl-section-header';
  header.textContent='— '+PLAYLISTS[activeTab].name.toUpperCase()+' —';
  tlist.appendChild(header);

  // find offset of this playlist in allTracks
  var offset=0;
  for(var pi=0;pi<activeTab;pi++) offset+=plData[pi].tracks.length;

  pl.tracks.forEach(function(t, i){
    var globalIdx = offset + i;
    var div=document.createElement('div');
    div.className='track'+(globalIdx===cur?' playing':'');
    div.innerHTML=
      '<span class="num">'+(i+1<10?'0'+(i+1):i+1)+'</span>'+
      '<span class="ico">'+(globalIdx===cur&&!aud.paused?'⏸':'▶')+'</span>'+
      '<div class="track-info"><div class="tname">'+t.name+'</div></div>'+
      '<span class="ext">'+t.ext+'</span>';
    div.addEventListener('click',function(){ playTrack(globalIdx); });

    var wrap=document.createElement('div');
    wrap.className='menu-wrap';
    attachMenu(wrap, function(){ return buildTrackMenu(globalIdx); });
    div.appendChild(wrap);

    tlist.appendChild(div);
  });
}

function renderQueue(){
  if(!queue.length){
    var d=document.createElement('div'); d.className='empty';
    d.textContent='Queue is empty.\nUse ⋮ on a track to add it.';
    d.style.whiteSpace='pre-line';
    tlist.appendChild(d);
    return;
  }

  var header=document.createElement('div');
  header.className='pl-section-header';
  header.textContent='— UP NEXT —';
  tlist.appendChild(header);

  queue.forEach(function(globalIdx, qPos){
    var t=allTracks[globalIdx];
    if(!t) return;
    var div=document.createElement('div');
    div.className='track';
    div.innerHTML=
      '<span class="num">'+(qPos+1<10?'0'+(qPos+1):qPos+1)+'</span>'+
      '<span class="ico">▶</span>'+
      '<div class="track-info"><div class="tname">'+t.name+'</div><div class="tplname">'+PLAYLISTS[t.plIdx].name.toUpperCase()+'</div></div>'+
      '<span class="ext">'+t.ext+'</span>';
    div.addEventListener('click',function(){ playTrack(globalIdx); });

    var wrap=document.createElement('div');
    wrap.className='menu-wrap';
    attachMenu(wrap, function(){ return buildQueueMenu(qPos); });
    div.appendChild(wrap);

    tlist.appendChild(div);
  });
}

function playTrack(i, noPlay){
  if(i<0||i>=allTracks.length) return;
  cur=i;
  var t=allTracks[i];
  aud.src=t.url;
  if(!noPlay){ aud.play().catch(function(){}); btnPP.textContent='⏸'; }
  else { btnPP.textContent='▶'; }
  npName.textContent=t.name;
  npPl.textContent=PLAYLISTS[t.plIdx].name;
  heroTitle.textContent=t.name;
  heroSub.textContent=PLAYLISTS[t.plIdx].name;
  heroArt.textContent=PLAYLISTS[t.plIdx].emoji;
  // switch tab/view to playing playlist if currently on tracks view
  if(currentView==='tracks' && activeTab!==t.plIdx){ activeTab=t.plIdx; buildTabs(); }
  renderList();
  if(currentView==='tracks'){
    var items=tlist.querySelectorAll('.track');
    var offset=0; for(var pi=0;pi<t.plIdx;pi++) offset+=plData[pi].tracks.length;
    var localIdx=i-offset;
    if(items[localIdx]) items[localIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}

// ── NEXT TRACK LOGIC (queue > shuffle > sequential) ──
// shuffle is scoped to the playlist of the currently playing track
function getNextIndex(){
  // 1. queue takes priority
  if(queue.length){
    return playFromQueueNext();
  }
  // 2. shuffle (within current track's playlist)
  if(shuffleOn && allTracks.length>1){
    var plIdx = (cur>=0 && allTracks[cur]) ? allTracks[cur].plIdx : activeTab;
    var candidates=[];
    allTracks.forEach(function(t,i){ if(t.plIdx===plIdx && i!==cur) candidates.push(i); });
    if(candidates.length){
      return candidates[Math.floor(Math.random()*candidates.length)];
    }
    // fallback: only one track in this playlist, just replay it
    if(cur>=0) return cur;
  }
  // 3. sequential
  if(!allTracks.length) return -1;
  return cur>=allTracks.length-1?0:cur+1;
}
function getPrevIndex(){
  if(shuffleOn && allTracks.length>1){
    var plIdx = (cur>=0 && allTracks[cur]) ? allTracks[cur].plIdx : activeTab;
    var candidates=[];
    allTracks.forEach(function(t,i){ if(t.plIdx===plIdx && i!==cur) candidates.push(i); });
    if(candidates.length){
      return candidates[Math.floor(Math.random()*candidates.length)];
    }
    if(cur>=0) return cur;
  }
  if(!allTracks.length) return -1;
  return cur<=0?allTracks.length-1:cur-1;
}

// ── LOAD ONE PLAYLIST ──
function loadPlaylist(pi){
  var pl=plData[pi];
  var info=pl.info;
  var branch=info.branch||'main';

  function tryFetch(br){
    fetch('https://api.github.com/repos/'+info.repo+'/git/trees/'+br+'?recursive=1')
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(data){
        if(!data.tree) throw new Error('No tree');
        pl.tracks=[];
        data.tree.forEach(function(item){
          if(item.type!=='blob') return;
          var ext=extOf(item.path);
          if(EXTS.indexOf(ext)===-1) return;
          pl.tracks.push({ name:cleanName(item.path), url:rawUrl(info.repo,br,item.path), ext:ext });
        });
        pl.loaded=true;
        rebuildAllTracks();
        updateStatus();
        if(currentView==='tracks' && activeTab===pi) renderList();
      })
      .catch(function(e){
        if(br==='main'){ tryFetch('master'); return; }
        pl.error=true; pl.loaded=true;
        rebuildAllTracks();
        updateStatus();
        if(currentView==='tracks' && activeTab===pi) renderList();
      });
  }
  tryFetch(branch);
}

function updateStatus(){
  var loaded=plData.filter(function(p){ return p.loaded; }).length;
  var total=plData.length;
  var totalTracks=allTracks.length;
  if(loaded<total){
    setStatus('', loaded+'/'+total+' playlists loaded…');
  } else {
    setStatus('ok', totalTracks+' track'+(totalTracks===1?'':'s')+' across '+total+' playlist'+(total===1?'':'s'));
  }
}

function restoreState(){
  var s=loadState();
  if(!s) return;
  if(s.shuffle){ shuffleOn=true; btnShuffle.classList.add('on'); }
  if(s.queue && Array.isArray(s.queue)){
    queue = s.queue.filter(function(i){ return i>=0 && i<allTracks.length; });
  }
  updateViewTabs();
  if(s.cur==null||s.cur<0||s.cur>=allTracks.length){ renderList(); return; }
  if(s.loop){ aud.loop=true; btnLoop.classList.add('on'); }
  if(s.tab!=null) activeTab=s.tab;
  pendingSeek=s.time||0;
  cur=s.cur;
  var t=allTracks[cur];
  aud.src=t.url;
  btnPP.textContent='▶';
  npName.textContent=t.name;
  npPl.textContent=PLAYLISTS[t.plIdx].name;
  heroTitle.textContent=t.name;
  heroSub.textContent=PLAYLISTS[t.plIdx].name;
  heroArt.textContent=PLAYLISTS[t.plIdx].emoji;
  buildTabs();
  renderList();
}

// ── AUDIO EVENTS ──
aud.addEventListener('loadedmetadata',function(){
  seek.max=aud.duration||0; tDur.textContent=fmt(aud.duration);
  if(pendingSeek>0&&pendingSeek<aud.duration){
    aud.currentTime=pendingSeek; seek.value=pendingSeek; tCur.textContent=fmt(pendingSeek); pendingSeek=-1;
  }
});
aud.addEventListener('play',function(){ btnPP.textContent='⏸'; renderList(); });
aud.addEventListener('pause',function(){ btnPP.textContent='▶'; renderList(); saveState(); });
aud.addEventListener('ended',function(){
  if(aud.loop) return;
  var ni=getNextIndex();
  if(ni>=0) playTrack(ni);
});
aud.addEventListener('timeupdate',function(){ if(!seeking){ seek.value=aud.currentTime; tCur.textContent=fmt(aud.currentTime); } });

// ── CONTROLS ──
btnPP.addEventListener('click',function(){
  if(cur<0&&allTracks.length) return playTrack(0);
  if(aud.paused){ aud.play().catch(function(){}); btnPP.textContent='⏸'; }
  else{ aud.pause(); btnPP.textContent='▶'; }
  renderList();
});
btnPrev.addEventListener('click',function(){
  if(!allTracks.length) return;
  var pi=getPrevIndex();
  if(pi>=0) playTrack(pi);
});
btnNext.addEventListener('click',function(){
  if(!allTracks.length) return;
  var ni=getNextIndex();
  if(ni>=0) playTrack(ni);
});
btnLoop.addEventListener('click',function(){ aud.loop=!aud.loop; btnLoop.classList.toggle('on',aud.loop); saveState(); });
btnShuffle.addEventListener('click',function(){
  shuffleOn=!shuffleOn;
  btnShuffle.classList.toggle('on',shuffleOn);
  saveState();
});
btnClearQ.addEventListener('click',function(){ clearQueue(); });

seek.addEventListener('mousedown',function(){ seeking=true; });
seek.addEventListener('input',function(){ tCur.textContent=fmt(Number(seek.value)); });
seek.addEventListener('change',function(){ aud.currentTime=Number(seek.value); seeking=false; saveState(); });
vol.addEventListener('input',function(){ aud.volume=Number(vol.value); saveState(); });

// ── BOOT ──
buildTabs();
updateViewTabs();
renderList();
setStatus('','Loading '+PLAYLISTS.length+' playlist'+(PLAYLISTS.length===1?'':'s')+'…');
PLAYLISTS.forEach(function(_,i){ loadPlaylist(i); });

// Restore state after all playlists finish
var restoreInterval=setInterval(function(){
  var done=plData.every(function(p){ return p.loaded; });
  if(done){
    clearInterval(restoreInterval);
    restoreState();
  }
},200);
</script>
