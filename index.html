
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05020d;--bg2:#0c0618;--bg3:#130d22;
  --border:rgba(160,100,255,0.15);--border2:rgba(160,100,255,0.3);
  --text:#e8deff;--muted:#9a7fc4;
  --accent:#b06fff;--accent2:#9550f5;
  --aglow:rgba(176,111,255,0.15);
}
body,html{background:transparent;}
.wrap{background:var(--bg);color:var(--text);font-family:'VT323',monospace;width:100%;min-height:100vh;display:flex;flex-direction:column;}

/* header */
.hdr{padding:18px 20px 12px;border-bottom:2px solid var(--border2);}
.hdr-label{font-family:'VT323',monospace;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.hdr-title{font-family:'Press Start 2P',monospace;font-size:clamp(12px,3vw,18px);font-weight:400;color:var(--text);text-shadow:0 0 18px rgba(176,111,255,.35);line-height:1.5;margin-bottom:4px;}
.hdr-sub{font-family:'VT323',monospace;font-size:clamp(15px,3vw,18px);color:var(--muted);}

/* status */
.status{padding:10px 20px;font-family:'Press Start 2P',monospace;font-size:9px;color:var(--accent);letter-spacing:.05em;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.status .dot{width:7px;height:7px;background:var(--accent);flex-shrink:0;animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.status.err .dot{background:#ff4444;animation:none;}
.status.err{color:#ff4444;}
.status.ok .dot{background:#44ff88;animation:none;}
.status.ok{color:#44ff88;}

/* track list */
.tlist{flex:1;overflow-y:auto;padding:8px 12px;}
.tlist::-webkit-scrollbar{width:4px;}
.tlist::-webkit-scrollbar-track{background:var(--bg2);}
.tlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.track{display:flex;align-items:center;gap:10px;padding:10px 12px;border:2px solid var(--border);border-radius:2px;margin-bottom:6px;cursor:pointer;transition:background .12s,border-color .12s;background:var(--bg2);}
.track:hover{background:var(--bg3);border-color:var(--accent);}
.track.playing{border-color:var(--accent);background:var(--aglow);}
.track .num{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--muted);min-width:20px;flex-shrink:0;}
.track.playing .num{color:var(--accent);}
.track .ico{font-size:11px;color:var(--muted);width:14px;flex-shrink:0;text-align:center;}
.track.playing .ico{color:var(--accent);}
.track .tname{font-family:'VT323',monospace;font-size:clamp(16px,3vw,20px);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.track.playing .tname{color:var(--accent);text-shadow:0 0 8px var(--accent);}
.track .ext{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:2px 5px;border-radius:1px;flex-shrink:0;}
.empty{text-align:center;padding:40px 20px;font-family:'Press Start 2P',monospace;font-size:9px;color:var(--muted);letter-spacing:.05em;line-height:1.8;}

/* player bar */
.bar{background:var(--bg2);border-top:2px solid var(--border2);padding:10px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;box-shadow:0 -4px 0 #6a00cc;}
.np{flex:1 1 140px;min-width:0;overflow:hidden;}
.np-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--accent);text-shadow:0 0 6px var(--accent);margin-bottom:3px;letter-spacing:.05em;}
.np-name{font-family:'VT323',monospace;font-size:clamp(15px,3vw,19px);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.transport{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tbtn{background:var(--aglow);border:2px solid var(--border2);color:var(--text);border-radius:2px;width:32px;height:32px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;padding:0;transition:border-color .1s,color .1s,transform .1s;flex-shrink:0;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn:active{transform:scale(.92);}
.tbtn.pp{width:38px;height:38px;background:var(--accent);color:#05020d;border:none;font-size:15px;box-shadow:3px 3px 0 #6a00cc;}
.tbtn.pp:hover{background:var(--accent2);color:#05020d;}
.tbtn.loop.on{border-color:var(--accent);color:var(--accent);}
.prog{flex:1 1 160px;display:flex;align-items:center;gap:6px;min-width:120px;}
.time{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);min-width:28px;text-align:center;flex-shrink:0;}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:1px;background:var(--bg3);border:1px solid var(--border);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:0;background:var(--accent);cursor:pointer;box-shadow:0 0 4px var(--accent);}
input[type=range]::-moz-range-thumb{width:11px;height:11px;border-radius:0;background:var(--accent);border:none;cursor:pointer;}
.vol-row{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.vol-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--muted);}
.vol-row input{width:60px;}

@media(max-width:480px){
  .hdr{padding:12px 14px 10px;}
  .bar{padding:8px 10px;gap:7px;}
  .tlist{padding:6px 8px;}
  .track{padding:8px 10px;}
  .vol-row{display:none;}
  .np{flex:1 1 100px;}
}
</style>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-label">♪ Music Player</div>
    <div class="hdr-title">Soundtrack</div>
    <div class="hdr-sub">Auto-loaded from <span style="color:var(--accent)">redvr777/BACC</span></div>
  </div>

  <div class="status" id="status">
    <div class="dot"></div>
    <span id="statusText">Scanning repo for audio files…</span>
  </div>

  <div class="tlist" id="tlist">
    <div class="empty" id="emptyMsg">Loading…</div>
  </div>

  <div class="bar">
    <div class="np">
      <div class="np-label">♪ NOW PLAYING</div>
      <div class="np-name" id="npName">Nothing playing</div>
    </div>
    <div class="transport">
      <button class="tbtn" id="btnPrev">⏮</button>
      <button class="tbtn pp" id="btnPP">▶</button>
      <button class="tbtn" id="btnNext">⏭</button>
      <button class="tbtn loop" id="btnLoop">⟲</button>
    </div>
    <div class="prog">
      <span class="time" id="tCur">0:00</span>
      <input type="range" id="seek" min="0" max="100" value="0" step="0.1">
      <span class="time" id="tDur">0:00</span>
    </div>
    <div class="vol-row">
      <span class="vol-lbl">VOL</span>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.7">
    </div>
  </div>
</div>

<audio id="aud"></audio>

<script>
// ── CONFIG ──────────────────────────────────────────────
var REPO  = 'redvr777/BACC';
var BRANCH = 'main'; // change to 'master' if needed
var AUDIO_EXT = ['mp3','wav','ogg','m4a','flac','aac','webm','opus','mov','mpeg','mpg'];
// ────────────────────────────────────────────────────────

var tracks = [];
var cur = -1;
var seeking = false;

var aud      = document.getElementById('aud');
var tlist    = document.getElementById('tlist');
var emptyMsg = document.getElementById('emptyMsg');
var npName   = document.getElementById('npName');
var btnPP    = document.getElementById('btnPP');
var btnPrev  = document.getElementById('btnPrev');
var btnNext  = document.getElementById('btnNext');
var btnLoop  = document.getElementById('btnLoop');
var seek     = document.getElementById('seek');
var tCur     = document.getElementById('tCur');
var tDur     = document.getElementById('tDur');
var vol      = document.getElementById('vol');
var statusEl = document.getElementById('status');
var statusTx = document.getElementById('statusText');

aud.volume = 0.7;

function setStatus(type, msg){
  statusEl.className = 'status ' + type;
  statusTx.textContent = msg;
}

function fmt(s){
  if(!s||isNaN(s))return'0:00';
  var m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function extOf(path){
  return (path.split('.').pop()||'').toLowerCase();
}

function cleanName(path){
  var n = path.split('/').pop();
  n = n.replace(/\.[^.]+$/,'');
  n = decodeURIComponent(n).replace(/[_+]/g,' ');
  return n;
}

function rawUrl(path){
  return 'https://raw.githubusercontent.com/'+REPO+'/'+BRANCH+'/'+path;
}

function render(){
  tlist.innerHTML='';
  if(!tracks.length){
    var d=document.createElement('div');
    d.className='empty';
    d.textContent='No audio files found in this repo.';
    tlist.appendChild(d);
    return;
  }
  tracks.forEach(function(t,i){
    var div=document.createElement('div');
    div.className='track'+(i===cur?' playing':'');
    div.innerHTML=
      '<span class="num">'+(i+1<10?'0'+(i+1):i+1)+'</span>'+
      '<span class="ico">'+(i===cur&&!aud.paused?'⏸':'▶')+'</span>'+
      '<span class="tname">'+t.name+'</span>'+
      '<span class="ext">'+t.ext+'</span>';
    div.addEventListener('click',function(){ playTrack(i); });
    tlist.appendChild(div);
  });
}

function playTrack(i){
  if(i<0||i>=tracks.length)return;
  cur=i;
  aud.src=tracks[i].url;
  aud.play().catch(function(){});
  npName.textContent=tracks[i].name;
  btnPP.textContent='⏸';
  render();
  // scroll track into view
  var el=tlist.querySelectorAll('.track')[i];
  if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ── GitHub API fetch ─────────────────────────────────────
function loadTracks(){
  var apiUrl='https://api.github.com/repos/'+REPO+'/git/trees/'+BRANCH+'?recursive=1';
  fetch(apiUrl)
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(data){
      if(!data.tree){throw new Error('No tree in response');}
      var found=[];
      data.tree.forEach(function(item){
        if(item.type!=='blob')return;
        var ext=extOf(item.path);
        if(AUDIO_EXT.indexOf(ext)===-1)return;
        found.push({
          name: cleanName(item.path),
          url:  rawUrl(item.path),
          ext:  ext
        });
      });
      tracks=found;
      if(!tracks.length){
        setStatus('err','No audio files found in redvr777/BACC');
      } else {
        setStatus('ok', tracks.length+' track'+(tracks.length===1?'':'s')+' loaded from BACC');
      }
      render();
    })
    .catch(function(e){
      // try master branch if main fails
      if(BRANCH==='main'){
        BRANCH='master';
        setStatus('','Retrying on master branch…');
        loadTracks();
        return;
      }
      setStatus('err','Could not load repo: '+e.message);
      emptyMsg.textContent='Failed to load. Check that redvr777/BACC is public.';
      render();
    });
}

// ── Transport ────────────────────────────────────────────
btnPP.addEventListener('click',function(){
  if(cur<0&&tracks.length)return playTrack(0);
  if(aud.paused){aud.play().catch(function(){});btnPP.textContent='⏸';}
  else{aud.pause();btnPP.textContent='▶';}
  render();
});
btnPrev.addEventListener('click',function(){
  if(!tracks.length)return;
  playTrack(cur<=0?tracks.length-1:cur-1);
});
btnNext.addEventListener('click',function(){
  if(!tracks.length)return;
  playTrack(cur>=tracks.length-1?0:cur+1);
});
btnLoop.addEventListener('click',function(){
  aud.loop=!aud.loop;
  btnLoop.classList.toggle('on',aud.loop);
});
aud.addEventListener('ended',function(){if(!aud.loop)btnNext.click();});
aud.addEventListener('play',function(){btnPP.textContent='⏸';render();});
aud.addEventListener('pause',function(){btnPP.textContent='▶';render();});
aud.addEventListener('loadedmetadata',function(){seek.max=aud.duration||0;tDur.textContent=fmt(aud.duration);});
aud.addEventListener('timeupdate',function(){if(!seeking){seek.value=aud.currentTime;tCur.textContent=fmt(aud.currentTime);}});
seek.addEventListener('mousedown',function(){seeking=true;});
seek.addEventListener('input',function(){tCur.textContent=fmt(Number(seek.value));});
seek.addEventListener('change',function(){aud.currentTime=Number(seek.value);seeking=false;});
vol.addEventListener('input',function(){aud.volume=Number(vol.value);});

loadTracks();
</script>
